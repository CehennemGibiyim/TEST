<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rehberler | Albion TR Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/guides.css">
    <link rel="stylesheet" href="../styles/settings.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="../../index.html" class="nav-logo"><i class="fas fa-crown"></i><span>Albion TR</span></a>
            <button class="nav-toggle" id="navToggle"><i class="fas fa-bars"></i></button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="../../index.html" class="nav-link"><i class="fas fa-home"></i> Ana Sayfa</a></li>
                <li><a href="market.html" class="nav-link"><i class="fas fa-chart-line"></i> Market</a></li>
                <li><a href="crafting.html" class="nav-link"><i class="fas fa-hammer"></i> Crafting</a></li>
                <li><a href="pvp.html" class="nav-link"><i class="fas fa-skull"></i> PvP</a></li>
                <li><a href="guides.html" class="nav-link active"><i class="fas fa-book"></i> Rehberler</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            <header class="page-header">
                <h1><i class="fas fa-book"></i> Build Rehberleri</h1>
                <p>Meta buildler ve AI destekli rehberler</p>
            </header>

            <div class="guides-filters">
                <div class="weapon-filters">
                    <button class="guide-btn active" data-weapon="all"><i class="fas fa-th"></i> Tümü</button>
                    <button class="guide-btn" data-weapon="sword"><i class="fas fa-sword"></i> Kılıç</button>
                    <button class="guide-btn" data-weapon="spear"><i class="fas fa-bullseye"></i> Mızrak</button>
                    <button class="guide-btn" data-weapon="bow"><i class="fas fa-bullseye"></i> Yay</button>
                    <button class="guide-btn" data-weapon="staff"><i class="fas fa-magic"></i> Asa</button>
                    <button class="guide-btn" data-weapon="dagger"><i class="fas fa-cut"></i> Hançer</button>
                    <button class="guide-btn" data-weapon="axe"><i class="fas fa-axe"></i> Balta</button>
                </div>
            </div>

            <section class="ai-chat-section">
                <div class="ai-chat-header">
                    <h2><i class="fas fa-robot"></i> AI Build Asistanı</h2>
                    <button class="btn btn-primary" id="askAI"><i class="fas fa-comments"></i> AI'ye Sor</button>
                </div>
                <div class="ai-chat-box" id="aiChatBox">
                    <div class="ai-message">
                        <i class="fas fa-robot"></i>
                        <p>Merhaba! Size nasıl yardımcı olabilirim? Meta buildler, crafting stratejileri veya pvp ipuçları hakkında sorabilirsiniz.</p>
                    </div>
                </div>
                <div class="ai-input-box">
                    <input type="text" id="aiQuestion" placeholder="Bir soru sorun...">
                    <button class="btn btn-primary" id="sendQuestion"><i class="fas fa-paper-plane"></i></button>
                </div>
            </section>

            <section class="guides-grid" id="guidesGrid">
                <!-- Build cards will be loaded -->
            </section>
        </div>
    </main>

    <footer class="footer"><div class="container"><div class="footer-bottom"><p>&copy; 2026 Albion TR Tools</p></div></div></footer>
    <script src="https://cdn.jsdelivr.net/npm/@google/generative-ai@0.2.1"></script>
    <script src="../lib/settings.js"></script>
    <script src="../lib/nav.js"></script>
    <script src="../lib/guides.js"></script>
</body>
</html>
