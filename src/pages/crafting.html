<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Albion Online Crafting Rehberi">
    <title>Crafting | Albion TR Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/crafting.css">
    <link rel="stylesheet" href="../styles/settings.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="../../index.html" class="nav-logo"><i class="fas fa-crown"></i><span>Albion TR</span></a>
            <button class="nav-toggle" id="navToggle"><i class="fas fa-bars"></i></button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="../../index.html" class="nav-link"><i class="fas fa-home"></i> Ana Sayfa</a></li>
                <li><a href="market.html" class="nav-link"><i class="fas fa-chart-line"></i> Market</a></li>
                <li><a href="crafting.html" class="nav-link active"><i class="fas fa-hammer"></i> Crafting</a></li>
                <li><a href="pvp.html" class="nav-link"><i class="fas fa-skull"></i> PvP</a></li>
                <li><a href="guides.html" class="nav-link"><i class="fas fa-book"></i> Rehberler</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            <header class="page-header">
                <h1><i class="fas fa-hammer"></i> Crafting Rehberi</h1>
                <p>Detaylı tarifler ve maliyet analizi</p>
            </header>

            <div class="crafting-categories">
                <button class="craft-tab active" data-category="weapons"><i class="fas fa-sword"></i><span>Silahlar</span></button>
                <button class="craft-tab" data-category="armor"><i class="fas fa-shield-alt"></i><span>Zırhlar</span></button>
                <button class="craft-tab" data-category="accessories"><i class="fas fa-ring"></i><span>Aksesuarlar</span></button>
                <button class="craft-tab" data-category="consumables"><i class="fas fa-flask"></i><span>Tüketim</span></button>
            </div>

            <div class="tier-selector">
                <label>Tier:</label>
                <div class="tier-buttons">
                    <button class="tier-btn" data-tier="4">T4</button>
                    <button class="tier-btn" data-tier="5">T5</button>
                    <button class="tier-btn active" data-tier="6">T6</button>
                    <button class="tier-btn" data-tier="7">T7</button>
                    <button class="tier-btn" data-tier="8">T8</button>
                </div>
            </div>

            <section class="recipe-section">
                <div class="recipe-header">
                    <h2><i class="fas fa-scroll"></i> Tarif Detayları</h2>
                    <select id="itemSelect" class="item-select"><option value="">Eşya Seç...</option></select>
                </div>
                <div class="recipe-content">
                    <div class="recipe-card">
                        <div class="recipe-image"><img id="recipeImage" src="https://via.placeholder.com/200?text=Item" alt="Item"></div>
                        <div class="recipe-details">
                            <h3 id="recipeName">Seçili Eşya</h3>
                            <div class="recipe-info">
                                <span class="recipe-tier"><i class="fas fa-star"></i> Tier 6.0</span>
                                <span class="recipe-station"><i class="fas fa-tools"></i> Forge</span>
                            </div>
                        </div>
                    </div>
                    <div class="recipe-materials">
                        <h4><i class="fas fa-list"></i> Malzemeler</h4>
                        <div class="materials-list" id="materialsList"></div>
                    </div>
                    <div class="recipe-costs">
                        <h4><i class="fas fa-coins"></i> Maliyet</h4>
                        <div class="cost-breakdown">
                            <div class="cost-item"><span class="cost-label">Toplam:</span><span class="cost-value" id="totalCost">0</span></div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="quality-section">
                <h2><i class="fas fa-gem"></i> Kalite Hesaplayıcı</h2>
                <div class="quality-grid">
                    <div class="quality-input"><label>Kalite Puanı</label><input type="number" id="qualityScore" placeholder="1000"></div>
                    <div class="quality-input"><label>Focus</label><input type="number" id="focusUsed" placeholder="100"></div>
                    <div class="quality-result"><h4>Beklenen Kalite</h4><div id="qualityBars"></div></div>
                </div>
            </section>
        </div>
    </main>

    <footer class="footer"><div class="container"><div class="footer-bottom"><p>&copy; 2026 Albion TR Tools</p></div></div></footer>
    <script src="../lib/settings.js"></script>
    <script src="../lib/nav.js"></script>
    <script src="../lib/crafting.js"></script>
</body>
</html>
