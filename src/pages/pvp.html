<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PvP Feed | Albion TR Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/pvp.css">
    <link rel="stylesheet" href="../styles/settings.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="../../index.html" class="nav-logo"><i class="fas fa-crown"></i><span>Albion TR</span></a>
            <button class="nav-toggle" id="navToggle"><i class="fas fa-bars"></i></button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="../../index.html" class="nav-link"><i class="fas fa-home"></i> Ana Sayfa</a></li>
                <li><a href="market.html" class="nav-link"><i class="fas fa-chart-line"></i> Market</a></li>
                <li><a href="crafting.html" class="nav-link"><i class="fas fa-hammer"></i> Crafting</a></li>
                <li><a href="pvp.html" class="nav-link active"><i class="fas fa-skull"></i> PvP</a></li>
                <li><a href="guides.html" class="nav-link"><i class="fas fa-book"></i> Rehberler</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            <header class="page-header">
                <h1><i class="fas fa-skull"></i> PvP Feed</h1>
                <p>Son ölümler ve guild savaşları</p>
            </header>

            <div class="pvp-filters">
                <select id="pvpServer"><option value="europe">Europe</option><option value="west">NA</option><option value="east">Asia</option></select>
                <input type="text" id="playerSearch" placeholder="Oyuncu veya Guild ara...">
            </div>

            <section class="pvp-feed">
                <div class="feed-header">
                    <h2><i class="fas fa-fire"></i> Son Ölümler</h2>
                    <span class="feed-count" id="feedCount">0 ölüm</span>
                </div>
                <div class="kills-list" id="killsList">
                    <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i><span>Yükleniyor...</span></div>
                </div>
            </section>
        </div>
    </main>

    <footer class="footer"><div class="container"><div class="footer-bottom"><p>&copy; 2026 Albion TR Tools</p></div></div></footer>
    <script src="../lib/settings.js"></script>
    <script src="../lib/nav.js"></script>
    <script src="../lib/pvp.js"></script>
    <script src="../data/pvp-feed.json"></script>
</body>
</html>
